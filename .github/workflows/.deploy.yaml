name: .deploy.yaml

on:
  workflow_call:
    inputs:
      image:
        description: 'Lenke til docker image'
        required: true
        type: string
      cluster:
        description: 'Cluster. gcp eller fss'
        required: true
        type: string

jobs:
  deploy-to-dev-cluster:
    name: dev-cluster
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7 # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-${{ inputs.cluster }}
          RESOURCE: apps/${{ github.workflow }}/.nais/dev.yaml
          VAR: image=${{ inputs.image }}

  deploy-to-prod-cluster:
    name: prod-cluster
    if: ${{ github.ref == 'refs/heads/main' || github.event.inputs.deploy-prod == 'true' }}
    needs: deploy-to-dev-cluster
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: andstor/file-existence-action@076e0072799f4942c8bc574a82233e1e4d13e9d6 # ratchet:andstor/file-existence-action@v3
        id: check_files
        with:
          files: "apps/${{ github.workflow }}/.nais/prod.yaml"
      - uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7 # ratchet:nais/deploy/actions/deploy@v2
        if: steps.check_files.outputs.files_exists == 'true'
        env:
          CLUSTER: prod-${{ inputs.cluster }}
          RESOURCE: apps/${{ github.workflow }}/.nais/prod.yaml
          VAR: image=${{ inputs.image }}
